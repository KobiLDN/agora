name: Build Android APK

# Builds the Agora Android debug APK on GitHub's runners (which have the
# Android SDK) and publishes it to a "android-latest" prerelease, so the APK
# has a stable direct-download URL you can open on the phone — no Android
# Studio, no local toolchain, works even from a locked-down machine.

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - claude/new-session-xmwji1
    paths:
      - 'agora-android/**'
      - '.github/workflows/android.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        working-directory: agora-android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          cp agora-android/app/build/outputs/apk/debug/app-debug.apk out/agora-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agora-debug-apk
          path: out/agora-debug.apk

      - name: Publish to android-latest release
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Agora Android (latest debug build)
          prerelease: true
          files: out/agora-debug.apk
          body: |
            Latest debug build of the Agora Android app.

            Install: download `agora-debug.apk` on your phone, open it, allow
            installing from this source if prompted. Debug builds are unsigned
            for release — Play Protect may warn; this is expected for a
            sideloaded personal build.
