<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Conversation Bridge</title>
  <style>
    body {
      width: 400px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    h2 {
      margin: 0 0 12px 0;
      color: #fff;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-container {
      background: #2a2a2a;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.online {
      background: #4caf50;
    }
    .status-dot.offline {
      background: #f44336;
    }
    .status-label {
      font-size: 13px;
    }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 12px 0;
    }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #4a6cf7;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background: #5f7ff7;
      transform: translateY(-1px);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    button.secondary {
      background: #333;
    }
    button.secondary:hover {
      background: #444;
    }
    button.danger {
      background: #dc3545;
    }
    button.danger:hover {
      background: #c82333;
    }
    .input-area {
      margin: 12px 0;
    }
    textarea {
      width: 100%;
      height: 60px;
      padding: 8px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      resize: vertical;
      font-family: inherit;
      font-size: 13px;
      box-sizing: border-box;
    }
    textarea:focus {
      outline: none;
      border-color: #4a6cf7;
    }
    .conversation-log {
      max-height: 300px;
      overflow-y: auto;
      background: #2a2a2a;
      border-radius: 6px;
      padding: 8px;
      margin-top: 8px;
      font-size: 12px;
    }
    .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid #333;
      display: flex;
      gap: 8px;
    }
    .log-entry .sender {
      font-weight: bold;
      min-width: 70px;
    }
    .log-entry .sender.deepseek {
      color: #4a6cf7;
    }
    .log-entry .sender.claude {
      color: #d97706;
    }
    .log-entry .sender.user {
      color: #10b981;
    }
    .log-entry .message {
      word-break: break-word;
      flex: 1;
    }
    .controls-row {
      display: flex;
      gap: 8px;
    }
    .controls-row button {
      flex: 1;
    }
    .badge {
      font-size: 11px;
      background: #333;
      padding: 2px 8px;
      border-radius: 12px;
      color: #aaa;
    }
    #toggleBridge {
      background: #4a6cf7;
    }
    #toggleBridge.active {
      background: #dc3545;
    }
  </style>
</head>
<body>
  <h2>
    🤖 AI Bridge
    <span class="badge" id="bridgeStatus">Off</span>
  </h2>

  <div class="status-container">
    <div class="status-item">
      <span class="status-dot" id="deepseekStatus"></span>
      <span class="status-label">DeepSeek: <span id="deepseekLabel">Checking...</span></span>
    </div>
    <div class="status-item">
      <span class="status-dot" id="claudeStatus"></span>
      <span class="status-label">Claude: <span id="claudeLabel">Checking...</span></span>
    </div>
  </div>

  <div class="controls">
    <button id="toggleBridge" class="active">🔗 Start Bridge</button>

    <div class="controls-row">
      <button id="syncTabs" class="secondary">📋 Sync Tabs</button>
      <button id="clearLog" class="secondary">🗑️ Clear Log</button>
    </div>
  </div>

  <div class="input-area">
    <textarea id="userInput" placeholder="Type your message to interject..."></textarea>
    <button id="sendUserMessage" style="margin-top: 8px; width: 100%;">✏️ Send (Interject)</button>
  </div>

  <div>
    <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
      <span style="font-size: 13px; font-weight: bold;">Conversation Log</span>
      <span style="font-size: 11px; color: #888;" id="messageCount">0 messages</span>
    </div>
    <div class="conversation-log" id="conversationLog"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
